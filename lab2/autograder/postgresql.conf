# PostgreSQL configuration for Lab 2 autograder
# Only non-default settings are listed here.

listen_addresses = 'localhost'
port = 5432

# Enable B-tree lab stats by default so the grader doesn't need SET.
# (Students can also use SET btree_lab.enable_stats = on/off in sessions.)
btree_lab.enable_stats = on

# Logging — keep it minimal for the autograder
log_min_messages = warning
client_min_messages = info
